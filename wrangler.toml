name = "starq"
compatibility_date = "2026-04-14"

# Cloudflare Pages will use `functions/` automatically.
# This file is for local dev (wrangler) + D1 binding config.

[[d1_databases]]
binding = "DB"
database_name = "starq-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
migrations_dir = "migrations"

